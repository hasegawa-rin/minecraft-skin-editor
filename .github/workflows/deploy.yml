name: Deploy to GitHub Pages

# main ブランチに push されるたびに、Vite でビルドして GitHub Pages へ公開する
on:
  push:
    branches: [main]
  # Actions タブから手動実行もできるようにする
  workflow_dispatch:

# GitHub Pages へのデプロイに必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時に複数のデプロイが走らないようにする（最新だけ実行）
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 依存パッケージをインストール
        run: npm ci

      - name: ビルド（dist/ を生成）
        run: npm run build

      - name: Pages 用に設定
        uses: actions/configure-pages@v5

      - name: ビルド成果物をアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pages へデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
